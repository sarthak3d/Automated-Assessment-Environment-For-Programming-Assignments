server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: assessment-platform-backend
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:assessment}
    username: ${DB_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      cache:
        default-ttl: 3600
  
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SSO_ISSUER_URI:https://sso.example.com/realms/assessment}
      client:
        registration:
          sso:
            client-id: ${SSO_CLIENT_ID:assessment-platform}
            client-secret: ${SSO_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            scope: openid,profile,email
        provider:
          sso:
            issuer-uri: ${SSO_ISSUER_URI:https://sso.example.com/realms/assessment}
            user-name-attribute: preferred_username
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  validity-hours: ${JWT_VALIDITY_HOURS:8}

gitlab:
  url: ${GITLAB_URL:http://localhost:8929}
  api-version: v4
  default-visibility: private

backend:
  sso:
    rolesClaim: roles
    rolesPrefix: ROLE_

assessment:
  grading:
    default-timeout-seconds: 300
  
  data-retention:
    enabled: true
    default-days: 365
    cleanup-schedule: "0 0 2 * * ?"
  
  module-gateway:
    url: ${MODULE_GATEWAY_URL:http://module-gateway}
    ci-runner-image: ${CI_RUNNER_IMAGE:alpine:3.19}

  backend-url: ${BACKEND_URL:http://assessment-assessment-platform-backend.assessment-platform.svc.cluster.local:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.assessment: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.gitlab4j: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
