apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
    spec:
      containers:
        - name: llm-service
          image: llm-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: LLM_SERVICE_MODEL_ID
              value: "zai-org/GLM-4.7-Flash"
            - name: LLM_SERVICE_TENSOR_PARALLEL_SIZE
              value: "1"
            - name: LLM_SERVICE_GPU_MEMORY_UTILIZATION
              value: "0.90"
            - name: LLM_SERVICE_MAX_MODEL_LEN
              value: "2048"
            - name: LLM_SERVICE_VLLM_DTYPE
              value: "auto"
            - name: LLM_SERVICE_ENABLE_PREFIX_CACHING
              value: "true"
            - name: LLM_SERVICE_QUANTIZATION
              value: "awq"
            - name: LLM_SERVICE_DEFAULT_TEMPERATURE
              value: "0.0"
            - name: LLM_SERVICE_DEFAULT_TOP_P
              value: "1.0"
            - name: LLM_SERVICE_DEFAULT_TOP_K
              value: "-1"
            - name: LLM_SERVICE_DEFAULT_REPETITION_PENALTY
              value: "1.0"
            - name: LLM_SERVICE_COMPILER_BASE_URL
              value: "http://judge0-server:2358"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app: llm-service
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-code-detector
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-code-detector
  template:
    metadata:
      labels:
        app: ai-code-detector
    spec:
      containers:
        - name: ai-code-detector
          image: ai-code-detector:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: HF_LOCAL_FILES_ONLY
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-code-detector
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app: ai-code-detector
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30801
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: performance-analyzer
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: performance-analyzer
  template:
    metadata:
      labels:
        app: performance-analyzer
    spec:
      containers:
        - name: performance-analyzer
          image: performance-analyzer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: API_MODE
              value: "true"
            - name: API_PORT
              value: "5000"
            - name: API_HOST
              value: "0.0.0.0"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: performance-analyzer
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app: performance-analyzer
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30802
