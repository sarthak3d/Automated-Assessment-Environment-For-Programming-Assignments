{{- if .Values.moduleGateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "assessment-platform.fullname" . }}-module-gateway-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "assessment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: module-gateway
data:
  default.conf.template: |
    resolver ${DNS_RESOLVER} valid=10s ipv6=off;

    log_format module_log '$remote_addr - [$time_local] "$request" '
                          '$status $body_bytes_sent '
                          '"upstream: $upstream_addr" '
                          'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log module_log;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen ${GATEWAY_PORT};
        server_name _;

        client_max_body_size 100m;

        location /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        location ~ ^/api/modules/([^/]+)/(.*)$ {
            set $module_host $1.{{ .Values.moduleGateway.config.moduleNamespace }}.svc.cluster.local;
            set $module_path $2;

            proxy_pass http://$module_host:${MODULE_PORT}/$module_path$is_args$args;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Module-Name $1;

            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 60s;

            proxy_buffering off;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "assessment-platform.fullname" . }}-module-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "assessment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: module-gateway
spec:
  replicas: {{ .Values.moduleGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "assessment-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: module-gateway
  template:
    metadata:
      labels:
        {{- include "assessment-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: module-gateway
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.moduleGateway.image.repository }}:{{ .Values.moduleGateway.image.tag }}"
          imagePullPolicy: {{ .Values.moduleGateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: DNS_RESOLVER
              value: {{ .Values.moduleGateway.config.dnsResolver | quote }}
            - name: GATEWAY_PORT
              value: "80"
            - name: MODULE_PORT
              value: {{ .Values.moduleGateway.config.modulePort | quote }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.moduleGateway.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "assessment-platform.fullname" . }}-module-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: module-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "assessment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: module-gateway
spec:
  type: {{ .Values.moduleGateway.service.type }}
  ports:
    - port: {{ .Values.moduleGateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "assessment-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: module-gateway
{{- end }}
