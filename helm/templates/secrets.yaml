{{- $runnerToken := .Values.gitlabRunner.registrationToken | default (randAlphaNum 32) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "assessment-platform.fullname" . }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "assessment-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITLAB_ROOT_PASSWORD: {{ .Values.gitlab.rootPassword | default (randAlphaNum 16) | quote }}
  GITLAB_ADMIN_TOKEN: {{ .Values.gitlab.adminToken | default "" | quote }}
  GITLAB_RUNNER_TOKEN: {{ $runnerToken | quote }}
  POSTGRESQL_PASSWORD: {{ .Values.postgresql.auth.password | default (randAlphaNum 16) | quote }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | default (randAlphaNum 16) | quote }}
  RABBITMQ_PASSWORD: {{ .Values.rabbitmq.auth.password | default (randAlphaNum 16) | quote }}
  SSO_CLIENT_SECRET: {{ .Values.backend.sso.clientSecret | default "" | quote }}
  JWT_SECRET: {{ randAlphaNum 64 | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "assessment-platform.fullname" . }}-runner-secrets
  namespace: {{ .Values.gitlabRunner.kubernetes.namespace }}
  labels:
    {{- include "assessment-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  RUNNER_REGISTRATION_TOKEN: {{ $runnerToken | quote }}
