{{- if .Values.gitlab.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "assessment-platform.fullname" . }}-gitlab
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "assessment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitlab
spec:
  type: {{ .Values.gitlab.service.type }}
  ports:
    - port: {{ .Values.gitlab.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.gitlab.service.sshPort }}
      targetPort: ssh
      protocol: TCP
      name: ssh
  selector:
    {{- include "assessment-platform.gitlab.selectorLabels" . | nindent 4 }}
{{- end }}
