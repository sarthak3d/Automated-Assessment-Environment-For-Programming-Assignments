{{- if .Values.gitlab.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "assessment-platform.fullname" . }}-gitlab
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "assessment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitlab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "assessment-platform.gitlab.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "assessment-platform.gitlab.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: gitlab
          image: "gitlab/gitlab-ce:16.7.0-ce.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: ssh
              containerPort: 22
              protocol: TCP
          env:
            - name: GITLAB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "assessment-platform.fullname" . }}-secrets
                  key: GITLAB_ROOT_PASSWORD
            - name: GITLAB_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "assessment-platform.fullname" . }}-secrets
                  key: GITLAB_RUNNER_TOKEN
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
{{ .Values.gitlab.env.GITLAB_OMNIBUS_CONFIG | nindent 16 }}
                gitlab_rails['initial_shared_runners_registration_token'] = ENV['GITLAB_RUNNER_REGISTRATION_TOKEN']
          volumeMounts:
            - name: gitlab-config
              mountPath: /etc/gitlab
            - name: gitlab-logs
              mountPath: /var/log/gitlab
            - name: gitlab-data
              mountPath: /var/opt/gitlab
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 900
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /users/sign_in
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 30
          resources:
            {{- toYaml .Values.gitlab.resources | nindent 12 }}
      volumes:
        - name: gitlab-config
          persistentVolumeClaim:
            claimName: {{ include "assessment-platform.fullname" . }}-gitlab-config
        - name: gitlab-logs
          persistentVolumeClaim:
            claimName: {{ include "assessment-platform.fullname" . }}-gitlab-logs
        - name: gitlab-data
          persistentVolumeClaim:
            claimName: {{ include "assessment-platform.fullname" . }}-gitlab-data
{{- end }}
