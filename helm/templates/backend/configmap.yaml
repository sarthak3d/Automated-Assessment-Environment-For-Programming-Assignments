apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "assessment-platform.fullname" . }}-backend-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "assessment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  application-kubernetes.yml: |
    server:
      port: {{ .Values.backend.service.port }}
      shutdown: graceful
    
    spring:
      application:
        name: assessment-platform-backend
      
      datasource:
        url: jdbc:postgresql://{{ include "assessment-platform.postgresql.host" . }}:5432/{{ .Values.postgresql.auth.database }}
        username: {{ .Values.postgresql.auth.username }}
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          connection-timeout: 30000
      
      jpa:
        hibernate:
          ddl-auto: validate
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
            format_sql: false
      
      data:
        redis:
          host: {{ include "assessment-platform.redis.host" . }}
          port: 6379
      
      {{- if .Values.rabbitmq.enabled }}
      rabbitmq:
        host: {{ include "assessment-platform.rabbitmq.host" . }}
        port: 5672
        username: {{ .Values.rabbitmq.auth.username }}
      {{- end }}

      {{- $springAutoConfigExcludes := list }}
      {{- if not .Values.rabbitmq.enabled }}
      {{- $springAutoConfigExcludes = append $springAutoConfigExcludes "org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration" }}
      {{- end }}
      {{- if not .Values.backend.sso.enabled }}
      {{- $springAutoConfigExcludes = append $springAutoConfigExcludes "org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration" }}
      {{- $springAutoConfigExcludes = append $springAutoConfigExcludes "org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration" }}
      {{- end }}
      {{- if gt (len $springAutoConfigExcludes) 0 }}
      autoconfigure:
        exclude:
        {{- range $springAutoConfigExcludes }}
          - {{ . }}
        {{- end }}
      {{- end }}

      {{- if .Values.backend.sso.enabled }}
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: {{ .Values.backend.sso.issuerUri }}
          client:
            registration:
              sso:
                client-id: {{ .Values.backend.sso.clientId }}
                authorization-grant-type: authorization_code
                scope: openid,profile,email
            provider:
              sso:
                issuer-uri: {{ .Values.backend.sso.issuerUri }}
                user-name-attribute: {{ .Values.backend.sso.userNameAttribute }}
      {{- end }}
      
      flyway:
        enabled: true
        baseline-on-migrate: true
        locations: classpath:db/migration
    
    jwt:
      validity-hours: 8
    
    backend:
      sso:
        enabled: {{ .Values.backend.sso.enabled }}
        rolesClaim: {{ .Values.backend.sso.rolesClaim }}
        rolesPrefix: ROLE_
    
    gitlab:
      url: {{ include "assessment-platform.gitlab.internalUrl" . }}
      api-version: v4
      default-visibility: private
    
    assessment:
      grading:
        default-timeout-seconds: {{ .Values.testModules.defaultTimeout }}
      
      data-retention:
        enabled: {{ .Values.dataRetention.enabled }}
        default-days: {{ .Values.dataRetention.defaultDays }}
        cleanup-cron: {{ .Values.dataRetention.cleanupSchedule | quote }}
      
      test-modules:
        images:
          correctness-evaluator: {{ .Values.testModules.images.correctnessEvaluator.repository }}:{{ .Values.testModules.images.correctnessEvaluator.tag }}
          performance-analyzer: {{ .Values.testModules.images.performanceAnalyzer.repository }}:{{ .Values.testModules.images.performanceAnalyzer.tag }}
          code-quality: {{ .Values.testModules.images.codeQuality.repository }}:{{ .Values.testModules.images.codeQuality.tag }}
          ai-plagiarism: {{ .Values.testModules.images.aiPlagiarism.repository }}:{{ .Values.testModules.images.aiPlagiarism.tag }}
          error-evaluator: {{ .Values.testModules.images.errorEvaluator.repository }}:{{ .Values.testModules.images.errorEvaluator.tag }}
          generic-runner: {{ .Values.testModules.images.genericRunner.repository }}:{{ .Values.testModules.images.genericRunner.tag }}
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: when-authorized
      health:
        livenessstate:
          enabled: true
        readinessstate:
          enabled: true
    
    logging:
      level:
        com.assessment: INFO
        org.springframework.security: WARN
        org.hibernate.SQL: WARN
